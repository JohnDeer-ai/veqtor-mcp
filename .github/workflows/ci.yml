# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: Exact commit to verify
        required: false
        type: string
      expected_mcpb_sha256:
        description: Optional accepted MCPB digest to bind during release reuse
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  VERIFY_REF: ${{ inputs.ref || github.sha }}
  SOURCE_DATE_EPOCH: "1580601600"
  DIST_ARTIFACT_NAME: veqtor-mcp-dist-${{ github.run_id }}-${{ github.run_attempt }}
  PYPI_ARTIFACT_NAME: veqtor-mcp-pypi-dist-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.VERIFY_REF }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Check lock freshness before project execution
        run: uv lock --check
      - name: Sync locked development environment
        run: uv sync --frozen --all-extras --python ${{ matrix.python }}
      - name: Run public tests
        run: uv run --frozen --python ${{ matrix.python }} pytest -q

  min-versions:
    name: Test declared minimum direct dependencies
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.VERIFY_REF }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Check lock freshness before project execution
        run: uv lock --check
      - name: Install declared minimum direct dependencies
        run: |
          uv venv /tmp/veqtor-min-versions --python 3.12.13
          uv pip install --python /tmp/veqtor-min-versions/bin/python --resolution lowest-direct ".[dev]"
      - name: Run tests against minimum direct dependencies
        run: /tmp/veqtor-min-versions/bin/python -m pytest -q

  artifact:
    name: Build and smoke release artifacts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.VERIFY_REF }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.17.0"
      - name: Check source formatting and lock freshness
        run: |
          uv lock --check
          git diff --check
      - name: Sync locked development environment
        run: uv sync --frozen --all-extras --python 3.12.13
      - name: Audit dependency licenses
        run: uv run --frozen pip-licenses --partial-match --fail-on "GPL;AGPL;LGPL;SSPL;BUSL"
      - name: Run pinned static analysis
        run: uvx ruff==0.15.21 check .
      - name: Audit the exact locked runtime dependency graph
        run: |
          LOCKED_REQUIREMENTS="$RUNNER_TEMP/veqtor-locked-runtime.txt"
          uv export --frozen --no-dev --no-emit-project \
            --format requirements-txt --output-file "$LOCKED_REQUIREMENTS"
          uvx pip-audit==2.10.1 \
            --requirement "$LOCKED_REQUIREMENTS" \
            --require-hashes --disable-pip --progress-spinner off
      - name: Build wheel, sdist and deterministic macOS MCPB
        run: |
          uv build --clear
          uv run --frozen python scripts/build_mcpb.py \
            --source-root . --out-dir dist \
            --stage-dir "$RUNNER_TEMP/veqtor-mcpb-stage"
      - name: Validate Python and MCPB artifact identity
        env:
          EXPECTED_MCPB_SHA256: ${{ inputs.expected_mcpb_sha256 }}
        run: |
          uvx twine check dist/*.whl dist/*.tar.gz
          uv run --frozen python scripts/check_release_artifacts.py \
            --source-root . --commit "$VERIFY_REF" dist/*.whl dist/*.tar.gz
          uv run --frozen python scripts/check_mcpb_artifact.py \
            --source-root . --commit "$VERIFY_REF" dist/*.mcpb
          npx --yes @anthropic-ai/mcpb@2.1.2 validate \
            "$RUNNER_TEMP/veqtor-mcpb-stage/manifest.json"
          npx --yes @anthropic-ai/mcpb@2.1.2 info dist/*.mcpb
          if test -n "$EXPECTED_MCPB_SHA256"; then
            test "$(sha256sum dist/*.mcpb | cut -d ' ' -f 1)" = \
              "$EXPECTED_MCPB_SHA256"
          fi
      - name: Create and smoke portable checksum manifest
        run: |
          (cd dist && sha256sum *.whl *.tar.gz *.mcpb > SHA256SUMS.txt)
          mkdir /tmp/veqtor-release-download
          cp dist/*.whl dist/*.tar.gz dist/*.mcpb dist/SHA256SUMS.txt \
            /tmp/veqtor-release-download/
          (cd /tmp/veqtor-release-download && sha256sum -c SHA256SUMS.txt)
      - name: Install and smoke the wheel in isolation
        run: |
          uv venv /tmp/veqtor-wheel-smoke --python 3.12
          uv pip install --python /tmp/veqtor-wheel-smoke/bin/python dist/*.whl
          cd /tmp
          /tmp/veqtor-wheel-smoke/bin/veqtor-mcp --version
          /tmp/veqtor-wheel-smoke/bin/veqtor-mcp doctor
          /tmp/veqtor-wheel-smoke/bin/python "$GITHUB_WORKSPACE/scripts/installed_wheel_smoke.py"
      - name: Smoke the wheel with exact declared minimums
        run: |
          uv venv /tmp/veqtor-wheel-min-smoke --python 3.12
          uv pip install --python /tmp/veqtor-wheel-min-smoke/bin/python "mcp==1.23.0" "lxml==6.1.0"
          uv pip install --python /tmp/veqtor-wheel-min-smoke/bin/python --no-deps dist/*.whl
          cd /tmp
          /tmp/veqtor-wheel-min-smoke/bin/veqtor-mcp --version
          /tmp/veqtor-wheel-min-smoke/bin/veqtor-mcp doctor
          /tmp/veqtor-wheel-min-smoke/bin/python "$GITHUB_WORKSPACE/scripts/installed_wheel_smoke.py"
      - name: Launch the exact MCPB command over stdio
        run: |
          uv run --frozen python scripts/mcpb_stdio_smoke.py \
            --stage-dir "$RUNNER_TEMP/veqtor-mcpb-stage"
      - name: Smoke all six tools against a copy of the bundled demo
        env:
          VEQTOR_TRACKED_CHANGE_AUTHOR: Veqtor MCPB CI
          VEQTOR_SMOKE_MATTER: ${{ runner.temp }}/veqtor-mcpb-smoke-demo
        run: |
          cp -R "$RUNNER_TEMP/veqtor-mcpb-stage/demo" \
            "$RUNNER_TEMP/veqtor-mcpb-smoke-demo"
          uv run --frozen --no-dev \
            --directory "$RUNNER_TEMP/veqtor-mcpb-stage" \
            veqtor-mcp --version
          uv run --frozen --no-dev \
            --directory "$RUNNER_TEMP/veqtor-mcpb-stage" \
            python "$GITHUB_WORKSPACE/scripts/installed_wheel_smoke.py"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.DIST_ARTIFACT_NAME }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.mcpb
            dist/SHA256SUMS.txt
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.PYPI_ARTIFACT_NAME }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  reproduce:
    name: Independently reproduce release artifacts
    needs: artifact
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.VERIFY_REF }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
          enable-cache: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.DIST_ARTIFACT_NAME }}
          path: approved-dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.PYPI_ARTIFACT_NAME }}
          path: approved-pypi-dist
      - name: Check lock before executing the candidate
        run: uv lock --check
      - name: Install the locked runtime needed to rebuild the bundled demo
        run: uv sync --frozen --no-dev --python 3.12.13
      - name: Rebuild independently and compare every artifact byte
        run: |
          uv run --frozen --no-dev python scripts/check_reproducible_build.py \
            --source-root . --approved-dir approved-dist \
            --mirror-dir approved-pypi-dist
          uv run --frozen --no-dev python scripts/check_reproducible_mcpb.py \
            --source-root . --approved-dir approved-dist

  gitleaks:
    name: Scan repository history for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.VERIFY_REF }}
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  required:
    name: Required CI gate
    if: ${{ always() }}
    needs: [test, min-versions, artifact, reproduce, gitleaks]
    runs-on: ubuntu-24.04
    steps:
      - name: Require every CI job
        shell: bash
        run: |
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.min-versions.result }}" = "success"
          test "${{ needs.artifact.result }}" = "success"
          test "${{ needs.reproduce.result }}" = "success"
          test "${{ needs.gitleaks.result }}" = "success"
