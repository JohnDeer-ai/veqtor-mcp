# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  push:
  pull_request:

jobs:
  test-and-license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install ".[dev,mcp]"
      - name: Run tests
        run: python -m pytest -q
      - name: Audit dependency licenses
        run: python -m piplicenses --fail-on "GPL;AGPL;LGPL;SSPL;BUSL"

