# SPDX-License-Identifier: Apache-2.0

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to tag and release (without v prefix)
        required: true
        type: string
      commit_sha:
        description: Full main-branch commit SHA to promote
        required: true
        type: string
      acceptance_evidence:
        description: Path-free veqtor_release_acceptance.v3 JSON for this commit
        required: true
        type: string
      acceptance_evidence_sha256:
        description: SHA-256 of the exact canonical acceptance evidence bytes
        required: true
        type: string

permissions:
  contents: read

env:
  DIST_ARTIFACT_NAME: veqtor-mcp-dist-${{ github.run_id }}-${{ github.run_attempt }}
  PYPI_ARTIFACT_NAME: veqtor-mcp-pypi-dist-${{ github.run_id }}-${{ github.run_attempt }}

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  guard:
    name: Verify promotion identity and ancestry
    runs-on: ubuntu-latest
    outputs:
      expected_mcpb_sha256: ${{ steps.validate_evidence.outputs.mcpb_sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify trusted main tip and package version
        shell: bash
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          [[ "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_SHA" = "$COMMIT_SHA"
          git fetch --no-tags origin main
          MAIN_SHA=$(git rev-parse origin/main)
          TAG_REF="refs/tags/v$VERSION"
          set +e
          TAG_LINE=$(git ls-remote --exit-code --refs origin "$TAG_REF")
          TAG_STATUS=$?
          set -e
          case "$TAG_STATUS" in
            0)
              read -r TAG_SHA RETURNED_REF <<<"$TAG_LINE"
              test "$RETURNED_REF" = "$TAG_REF"
              test "$TAG_SHA" = "$COMMIT_SHA"
              git merge-base --is-ancestor "$COMMIT_SHA" "$MAIN_SHA"
              ;;
            2)
              test "$MAIN_SHA" = "$COMMIT_SHA"
              ;;
            *)
              echo "remote tag lookup failed" >&2
              exit "$TAG_STATUS"
              ;;
          esac
          PACKAGE_VERSION=$(git show "$COMMIT_SHA:pyproject.toml" | python3 -c 'import sys, tomllib; print(tomllib.load(sys.stdin.buffer)["project"]["version"])')
          test "$VERSION" = "$PACKAGE_VERSION"
      - name: Check out the exact trusted candidate
        shell: bash
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          git checkout --detach "$COMMIT_SHA"
          test "$(git rev-parse HEAD)" = "$COMMIT_SHA"
      - name: Seal exact acceptance evidence bytes
        shell: bash
        env:
          ACCEPTANCE_EVIDENCE: ${{ inputs.acceptance_evidence }}
          ACCEPTANCE_EVIDENCE_SHA256: ${{ inputs.acceptance_evidence_sha256 }}
        run: |
          set -euo pipefail
          [[ "$ACCEPTANCE_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          umask 077
          EVIDENCE_FILE="$RUNNER_TEMP/veqtor-release-acceptance.json"
          printf '%s' "$ACCEPTANCE_EVIDENCE" > "$EVIDENCE_FILE"
          ACTUAL_EVIDENCE_SHA256=$(sha256sum "$EVIDENCE_FILE" | cut -d ' ' -f 1)
          test "$ACTUAL_EVIDENCE_SHA256" = "$ACCEPTANCE_EVIDENCE_SHA256"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Install locked runtime for evidence validation
        run: uv sync --frozen --no-dev --python 3.12.13
      - name: Validate exact-candidate acceptance evidence
        id: validate_evidence
        shell: bash
        env:
          ACCEPTANCE_EVIDENCE_SHA256: ${{ inputs.acceptance_evidence_sha256 }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$COMMIT_SHA"
          EVIDENCE_FILE="$RUNNER_TEMP/veqtor-release-acceptance.json"
          uv run --frozen --no-dev --python 3.12.13 \
            python scripts/check_acceptance_evidence.py \
            --expected-sha256 "$ACCEPTANCE_EVIDENCE_SHA256" \
            --source-root . "$EVIDENCE_FILE"
          MCPB_SHA256=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["desktop_extension"]["artifact_sha256"])' "$EVIDENCE_FILE")
          printf 'mcpb_sha256=%s\n' "$MCPB_SHA256" >> "$GITHUB_OUTPUT"

  verify:
    name: Run complete reusable CI
    needs: guard
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.commit_sha }}
      expected_mcpb_sha256: ${{ needs.guard.outputs.expected_mcpb_sha256 }}

  attempt_guard:
    name: Verify complete current release attempt
    needs: [guard, verify]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      verified_attempt: ${{ steps.verify_attempt.outputs.verified_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false
      - name: Verify every required gate succeeded in this attempt
        id: verify_attempt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT/jobs?per_page=100" \
            > "$RUNNER_TEMP/release-attempt-jobs.json"
          python3 .github/scripts/verify_release_attempt.py \
            --jobs "$RUNNER_TEMP/release-attempt-jobs.json" \
            --commit "$COMMIT_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --attempt "$GITHUB_RUN_ATTEMPT"
          printf 'verified_attempt=%s\n' "$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

  reserve_tag:
    name: Reserve exact release tag
    needs: [guard, verify, attempt_guard]
    if: ${{ needs.attempt_guard.outputs.verified_attempt == format('{0}', github.run_attempt) }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      reserved_attempt: ${{ steps.reserve.outputs.reserved_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false
      - name: Reserve the create-only lightweight tag
        id: reserve
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ADMIN_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
          VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          RELEASE_PHASE: reserve_tag
        run: |
          python3 .github/scripts/promote_release.py
          printf 'reserved_attempt=%s\n' "$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish immutable GitHub release
    needs: [guard, verify, attempt_guard, reserve_tag, verify_pypi]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Require a complete proof for the current attempt
        env:
          VERIFIED_ATTEMPT: ${{ needs.attempt_guard.outputs.verified_attempt }}
        run: test "$VERIFIED_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
      - name: Require the exact tag reservation from this attempt
        env:
          RESERVED_ATTEMPT: ${{ needs.reserve_tag.outputs.reserved_attempt }}
        run: test "$RESERVED_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Install the locked runtime for public MCPB verification
        run: |
          uv lock --check
          uv sync --frozen --no-dev --python 3.12.13
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.DIST_ARTIFACT_NAME }}
          path: dist
      - name: Promote the verified artifacts idempotently
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ADMIN_TOKEN: ${{ secrets.RELEASE_ADMIN_READ_TOKEN }}
          VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          TAG_RESERVED_ATTEMPT: ${{ needs.reserve_tag.outputs.reserved_attempt }}
        run: python3 .github/scripts/promote_release.py
      - name: Verify the published release as a public consumer
        env:
          VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: uv run --frozen --no-dev python .github/scripts/verify_published_release.py

  publish_pypi:
    name: Publish verified artifacts to PyPI
    needs: [attempt_guard, reserve_tag]
    if: ${{ needs.reserve_tag.outputs.reserved_attempt == format('{0}', github.run_attempt) }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/veqtor-mcp/${{ inputs.version }}/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.PYPI_ARTIFACT_NAME }}
          path: dist
      - name: Publish the exact verified wheel and sdist with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true
          # A retry may find files uploaded by an earlier attempt. The public
          # verifier still requires byte equality with the current approved
          # artifacts and Trusted Publisher provenance for this repository,
          # workflow, and environment; it does not bind that provenance to a
          # particular run attempt.
          skip-existing: true

  verify_pypi:
    name: Verify PyPI release as a public consumer
    needs: [publish_pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.PYPI_ARTIFACT_NAME }}
          path: dist
      - name: Verify public PyPI bytes and Trusted Publisher provenance
        env:
          VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/verify_published_pypi.py
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Smoke the exact public PyPI onboarding path
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd "$RUNNER_TEMP"
          uvx "veqtor-mcp@$VERSION" --version
          uvx "veqtor-mcp@$VERSION" doctor
          uvx --from "veqtor-mcp==$VERSION" veqtor-demo-rounds \
            "$RUNNER_TEMP/veqtor-public-demo"
          test "$(find "$RUNNER_TEMP/veqtor-public-demo" -maxdepth 1 -name '*.docx' | wc -l | tr -d ' ')" = 4
